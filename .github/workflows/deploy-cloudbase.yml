name: Verify and Deploy CloudBase

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudbase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and build
        run: npm run verify

      - name: Install CloudBase CLI
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
        run: npm install --global @cloudbase/cli@3.6.1

      - name: Log in to CloudBase
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          set -euo pipefail
          : "${TCB_SECRET_ID:?TCB_SECRET_ID is not configured}"
          : "${TCB_SECRET_KEY:?TCB_SECRET_KEY is not configured}"
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Deploy CloudBase application
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
        working-directory: dist
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          : "${TCB_ENV_ID:?TCB_ENV_ID is not configured}"
          tcb app info laptop --env-id "$TCB_ENV_ID" --json
          tcb app deploy laptop \
            --env-id "$TCB_ENV_ID" \
            --framework static \
            --install-command "" \
            --build-command "" \
            --output-dir ./ \
            --deploy-path / \
            --force \
            --yes \
            --json
